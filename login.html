<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FamilyOS</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#F5F0E8;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:20px;
      width:320px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:20px;
      color:#C4622D;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:14px;
      border-radius:12px;
      border:1px solid #ddd;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#C4622D;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .info{
      margin-top:15px;
      color:#666;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>FamilyOS</h1>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Parola">

  <button onclick="login()">Login / Register</button>

  <div class="info" id="info"></div>
</div>

<script>

const supabaseUrl = 'https://zezjzsyipmhifccuweze.supabase.co';
const supabaseKey = 'sb_publishable_FE4eNsKVDsfiPaCDoeIkxA_6t5VNw1k';

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function login(){

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if(error){

    const loginData = await client.auth.signInWithPassword({
      email,
      password
    });

    if(loginData.error){
      document.getElementById('info').innerText = loginData.error.message;
      return;
    }

    window.location.href = "/app.html";

  } else {

    document.getElementById('info').innerText =
      "Cont creat. Verifică emailul.";

  }

}

</script>

</body>
</html>
